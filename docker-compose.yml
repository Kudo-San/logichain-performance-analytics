services:
  db:
    image: postgres:14-alpine
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_USER: user_ecommerce
      POSTGRES_PASSWORD: senhaforte!
      POSTGRES_DB: ecomm_datawarehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_ecommerce -d ecomm_datawarehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl_service:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    container_name: etl_processor
    restart: "no" 
    environment:
      - DB_HOST=db
      - DB_USER=user_ecommerce
      - DB_PASSWORD=senhaforte!
      - DB_NAME=ecomm_datawarehouse
    volumes:
      - ./scripts:/app/scripts 
      - ./data_raw:/app/data_raw
    depends_on:
      db:
        condition: service_healthy 

volumes:
  postgres_data: